name: Publish to Chrome Web Store

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from package.json
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Update manifest.json version to match package.json
          jq --arg v "$VERSION" '.version = $v' public/manifest.json > tmp.json && mv tmp.json public/manifest.json

      - name: Build extension
        run: pnpm build

      - name: Package extension
        run: |
          cd dist
          zip -r ../extension.zip .

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
          publish: true
